name: Deploy

on:
  push:
    tags: ["v*"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t contract-ai-backend:${{ github.ref_name }} backend/

      - name: Build frontend image
        run: docker build -t contract-ai-frontend:${{ github.ref_name }} frontend/

      # Push to container registry (configure per platform)
